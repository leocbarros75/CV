<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Music Ministry Inventory - Immanuel Baptist</title>

  <style>
    body {
      background-color: #DEF5E5;
      font-family: Arial, sans-serif;
    }
    h1 {
      font-size: 1.4em;
    }
    table.inventory {
      border-collapse: collapse;
      width: 100%;
      margin-top: 16px;
    }
    table.inventory th {
      background-color: #6DBF8A;
      color: #fff;
      padding: 8px 10px;
      text-align: left;
      border: 1px solid #4a9a66;
    }
    table.inventory td {
      padding: 7px 10px;
      border: 1px solid #aad9bb;
      word-break: break-word;
    }
    table.inventory tr:nth-child(even) td {
      background-color: #c8eeda;
    }
    table.inventory tr:hover td {
      background-color: #b0e0c8;
    }
    hr {
      border-style: none;
      border-top-style: dotted;
      border-color: grey;
      border-width: 6px;
      width: 7%;
      margin-left: 0;
    }
    .back-link {
      margin-top: 20px;
      display: inline-block;
    }
    .loading {
      color: #2a6640;
      font-style: italic;
      padding: 12px 0;
    }

    /* Add Item Form */
    .add-form {
      background-color: #c8eeda;
      border: 1px solid #4a9a66;
      border-radius: 6px;
      padding: 16px 20px;
      margin-top: 28px;
      max-width: 800px;
    }
    .add-form h2 {
      font-size: 1em;
      margin: 0 0 12px 0;
      color: #2a6640;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 20px;
    }
    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      table.inventory {
        font-size: 0.82em;
      }
    }
    .form-grid label {
      display: flex;
      flex-direction: column;
      font-size: 0.85em;
      font-weight: bold;
      color: #2a6640;
      gap: 3px;
    }
    .form-grid input {
      padding: 5px 7px;
      border: 1px solid #4a9a66;
      border-radius: 4px;
      font-size: 0.9em;
      background-color: #f0fbf4;
    }
    .form-grid input:focus {
      outline: 2px solid #6DBF8A;
      background-color: #fff;
    }
    .form-actions {
      margin-top: 12px;
    }
    .btn-add {
      background-color: #6DBF8A;
      color: #fff;
      border: none;
      padding: 8px 22px;
      border-radius: 4px;
      font-size: 0.95em;
      cursor: pointer;
    }
    .btn-add:hover {
      background-color: #4a9a66;
    }
    .btn-delete {
      background: none;
      border: none;
      color: #c0392b;
      cursor: pointer;
      font-size: 1em;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .btn-delete:hover {
      background-color: #fdecea;
    }
    .msg-saved {
      display: none;
      color: #2a6640;
      font-size: 0.85em;
      margin-left: 10px;
      font-style: italic;
    }
    .status-bar {
      font-size: 0.8em;
      color: #555;
      margin-top: 6px;
    }
    .status-bar.error {
      color: #c0392b;
    }
  </style>
</head>

<body>
  <h1>Music Ministry Equipment Inventory</h1>
  <p><em>Immanuel Baptist Church</em></p>
  <hr>

  <div class="status-bar" id="status-bar"></div>

  <table class="inventory" cellspacing="0">
    <thead>
      <tr>
        <th>#</th>
        <th>Item Name</th>
        <th>Purpose</th>
        <th>Qty</th>
        <th>Location</th>
        <th>Purchase Year</th>
        <th>Maintenance Schedule</th>
        <th>Value (USD)</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="inventory-body">
      <tr><td colspan="9" class="loading">Loading inventory&hellip;</td></tr>
    </tbody>
  </table>

  <!-- Add Item Form -->
  <div class="add-form">
    <h2>Add New Item</h2>
    <form id="add-item-form">
      <div class="form-grid">
        <label>Item Name <input type="text" id="f-name" placeholder="e.g. Trumpet" required></label>
        <label>Purpose <input type="text" id="f-purpose" placeholder="e.g. Brass section / worship band" required></label>
        <label>Quantity <input type="number" id="f-qty" placeholder="1" min="1" required></label>
        <label>Location <input type="text" id="f-location" placeholder="e.g. Music Room" required></label>
        <label>Purchase Year <input type="number" id="f-year" placeholder="2024" min="1900" max="2100" required></label>
        <label>Maintenance Schedule <input type="text" id="f-maintenance" placeholder="e.g. Annual inspection" required></label>
        <label>Value (USD) <input type="text" id="f-value" placeholder="e.g. $500" required></label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-add">Add Item</button>
        <span class="msg-saved" id="msg-saved">Saved!</span>
      </div>
    </form>
  </div>

  <br>
  <a class="back-link" href="index.html">&larr; Back to Main Page</a>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getDatabase, ref, push, remove, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDYt42-EpCfjdvSGilWIvWxPQKakB_ee6o",
      authDomain: "immanuel-music-inventory.firebaseapp.com",
      databaseURL: "https://immanuel-music-inventory-default-rtdb.firebaseio.com",
      projectId: "immanuel-music-inventory",
      storageBucket: "immanuel-music-inventory.firebasestorage.app",
      messagingSenderId: "368447755989",
      appId: "1:368447755989:web:6b3b5e6cd8cbda65ea345c"
    };

    const DEFAULT_ITEMS = [
      { name: 'Grand Piano', purpose: 'Worship accompaniment / solos', qty: '1', location: 'Sanctuary', year: '2015', maintenance: 'Annual tuning & regulation', value: '$12,000' },
      { name: 'Digital Drum Kit', purpose: 'Rhythm / percussion for worship band', qty: '1', location: 'Stage / Sanctuary', year: '2019', maintenance: 'Annual inspection; pad replacement as needed', value: '$2,500' },
      { name: 'Electric Guitar', purpose: 'Lead guitar for worship band', qty: '2', location: 'Music Room', year: '2018', maintenance: 'String replacement every 3 months; annual setup', value: '$900' },
      { name: 'Bass Guitar', purpose: 'Bass line for worship band', qty: '1', location: 'Music Room', year: '2018', maintenance: 'String replacement every 6 months; annual setup', value: '$750' },
      { name: 'Acoustic Guitar', purpose: 'Acoustic worship sets / small groups', qty: '2', location: 'Music Room', year: '2020', maintenance: 'String replacement every 3 months', value: '$600' },
      { name: 'Violin', purpose: 'Orchestral worship / special music', qty: '3', location: 'Music Room', year: '2017', maintenance: 'Bow re-hairing annually; bridge & string check every 6 months', value: '$1,200' },
      { name: 'Viola', purpose: 'Orchestral worship / special music', qty: '2', location: 'Music Room', year: '2017', maintenance: 'Bow re-hairing annually; string replacement every 6 months', value: '$1,000' },
      { name: 'PA System (Main)', purpose: 'Sound reinforcement for sanctuary', qty: '1', location: 'Sanctuary', year: '2016', maintenance: 'Semi-annual inspection; cable check monthly', value: '$8,000' },
      { name: 'Digital Mixing Console', purpose: 'Audio mixing for live worship', qty: '1', location: 'Sound Booth', year: '2020', maintenance: 'Firmware updates as released; annual cleaning', value: '$3,500' },
      { name: 'Wireless Microphone System', purpose: 'Vocals / handheld mics for worship leaders', qty: '4', location: 'Sound Booth', year: '2021', maintenance: 'Battery replacement weekly; transmitter check monthly', value: '$2,800' },
      { name: 'Wired Microphone (SM58)', purpose: 'Backup vocals / choir mics', qty: '6', location: 'Sound Booth', year: '2018', maintenance: 'Capsule cleaning every 6 months', value: '$660' },
      { name: 'Monitor Speakers (Stage)', purpose: 'In-ear / stage monitors for musicians', qty: '4', location: 'Stage / Sanctuary', year: '2019', maintenance: 'Annual inspection; driver check every 6 months', value: '$1,600' },
      { name: 'Keyboard / Synthesizer', purpose: 'Keys / pads for worship band', qty: '1', location: 'Stage / Sanctuary', year: '2022', maintenance: 'Software/firmware updates; annual cleaning', value: '$1,800' },
      { name: 'Music Stands', purpose: 'Sheet music support for choir & orchestra', qty: '20', location: 'Choir Room', year: '2016', maintenance: 'Inspect for stability annually', value: '$600' },
      { name: 'Choir Robes', purpose: 'Uniform attire for choir', qty: '30', location: 'Choir Room', year: '2018', maintenance: 'Dry clean annually; inspect for wear', value: '$2,400' }
    ];

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const inventoryRef = ref(db, 'inventory');
    const statusBar = document.getElementById('status-bar');

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderTable(items) {
      const tbody = document.getElementById('inventory-body');
      if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="loading">No items yet. Add one below.</td></tr>';
        return;
      }
      tbody.innerHTML = items.map((item, i) =>
        `<tr>
          <td>${i + 1}</td>
          <td>${escapeHtml(item.name)}</td>
          <td>${escapeHtml(item.purpose)}</td>
          <td>${escapeHtml(item.qty)}</td>
          <td>${escapeHtml(item.location)}</td>
          <td>${escapeHtml(item.year)}</td>
          <td>${escapeHtml(item.maintenance)}</td>
          <td>${escapeHtml(item.value)}</td>
          <td><button class="btn-delete" onclick="window.deleteItem('${escapeHtml(item._key)}')" title="Delete">&#x2715;</button></td>
        </tr>`
      ).join('');
    }

    // Real-time listener — updates instantly on all open devices
    let seeded = false;
    onValue(inventoryRef, (snapshot) => {
      statusBar.textContent = '';
      if (!snapshot.exists() && !seeded) {
        seeded = true;
        statusBar.textContent = 'Setting up inventory for the first time\u2026';
        Promise.all(DEFAULT_ITEMS.map(item => push(inventoryRef, item)))
          .then(() => { statusBar.textContent = ''; });
      } else if (snapshot.exists()) {
        const items = [];
        snapshot.forEach(child => {
          items.push({ _key: child.key, ...child.val() });
        });
        renderTable(items);
      }
    }, (error) => {
      statusBar.className = 'status-bar error';
      statusBar.textContent = 'Could not connect to database. Check your internet connection.';
      console.error('Firebase error:', error);
    });

    // Expose delete to inline onclick handlers
    window.deleteItem = function(key) {
      if (confirm('Delete this item?')) {
        remove(ref(db, 'inventory/' + key));
      }
    };

    document.getElementById('add-item-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const newItem = {
        name:        document.getElementById('f-name').value.trim(),
        purpose:     document.getElementById('f-purpose').value.trim(),
        qty:         document.getElementById('f-qty').value.trim(),
        location:    document.getElementById('f-location').value.trim(),
        year:        document.getElementById('f-year').value.trim(),
        maintenance: document.getElementById('f-maintenance').value.trim(),
        value:       document.getElementById('f-value').value.trim()
      };
      push(inventoryRef, newItem).then(() => {
        e.target.reset();
        const msg = document.getElementById('msg-saved');
        msg.style.display = 'inline';
        setTimeout(() => { msg.style.display = 'none'; }, 2000);
      });
    });
  </script>
</body>

</html>
